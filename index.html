<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donasi Dewa Clean</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<style>
body{
 margin:0;
 font-family:'Segoe UI';
 background:radial-gradient(circle at top,#020617,#000);
 color:white;
}

/* SPLASH */
#splash{
 position:fixed;
 width:100%;
 height:100%;
 background:black;
 display:flex;
 justify-content:center;
 align-items:center;
 z-index:999;
 animation:fadeOut 3s forwards 3s;
}
@keyframes fadeOut{to{opacity:0;visibility:hidden;}}

/* NAV */
.nav{
 display:flex;
 justify-content:space-between;
 padding:12px;
 background:#111827;
 position:sticky;
 top:0;
 z-index:10;
}

/* PAGE */
.page{display:none;padding:15px;}
.active{display:block;}

/* CARD */
.glass{
 background:rgba(255,255,255,0.05);
 backdrop-filter:blur(15px);
 border-radius:15px;
 padding:15px;
 margin-bottom:15px;
}

/* INPUT */
input,button{
 width:100%;
 padding:12px;
 margin-top:10px;
 border:none;
 border-radius:10px;
}
button{
 background:linear-gradient(45deg,#22c55e,#4ade80);
 font-weight:bold;
}

/* QR */
.qris{width:100%;border-radius:10px;margin-top:10px;}

/* LIST */
.card{
 margin-top:10px;
 padding:12px;
 border-radius:10px;
 background:#111827;
}

/* TOP */
.top1{background:gold;color:black;}
.top2{background:silver;color:black;}
.top3{background:orange;color:black;}

/* NOTIF */
#notif{
 position:fixed;
 top:20px;
 left:50%;
 transform:translateX(-50%);
 background:#22c55e;
 padding:10px 20px;
 border-radius:20px;
 display:none;
 z-index:9999;
}

/* ADMIN BUTTON */
#adminBtn{
 position:fixed;
 bottom:20px;
 right:20px;
 background:#22c55e;
 border-radius:50%;
 width:55px;
 height:55px;
 display:flex;
 align-items:center;
 justify-content:center;
 font-size:22px;
}

/* ADMIN PANEL */
#adminPanel{
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 background:rgba(0,0,0,0.7);
 display:none;
 align-items:center;
 justify-content:center;
}

.adminBox{
 background:#111827;
 padding:20px;
 border-radius:12px;
 width:90%;
 max-width:300px;
}
</style>
</head>

<body>

<div id="splash">
<h2>💛 Donasi Bayi Ditemukan<br>Bantu masa depan 🙏</h2>
</div>

<div id="notif"></div>

<div class="nav">
<div>
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('list')">Donatur</button>
</div>
</div>

<!-- HOME -->
<div id="home" class="page active">

<div class="glass">
<h3>💸 Donasi</h3>
<p><b>DANA:</b> 08XXXXXXXX</p>
<img src="qris.jpg" class="qris">

<input id="nama" placeholder="Nama">
<input id="jumlah" type="number" placeholder="Jumlah">
<input id="bukti" type="file">
<button onclick="kirimDonasi()">Kirim Donasi</button>
</div>

<div class="glass">
<h3>🏆 Leaderboard</h3>
<div id="leaderboard"></div>
</div>

<div id="rankDeleteBox" class="glass" style="display:none;">
<h3>🗑️ Hapus Peringkat</h3>
<input id="rankDelete" type="number" placeholder="Contoh: 1">
<button onclick="hapusRank()">Hapus</button>
</div>

<div id="pendingBox" class="glass" style="display:none;">
<h3>⏳ Pending</h3>
<div id="pending"></div>
</div>

</div>

<!-- LIST -->
<div id="list" class="page">
<div class="glass">
<h3>📄 Semua Donatur</h3>
<div id="listDonatur"></div>
</div>
</div>

<!-- ADMIN BUTTON -->
<div id="adminBtn" onclick="openAdmin()">⚙️</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
<div class="adminBox">
<h3>Admin Login</h3>
<input id="pass" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
<button onclick="closeAdmin()">Tutup</button>
</div>
</div>

<script>
// FIREBASE
const firebaseConfig={
 apiKey:"AIzaSyBnvcyMdTflihDPg68zsLG-9QxiyV36hgg",
 authDomain:"miawwquenn.firebaseapp.com",
 databaseURL:"https://miawwquenn-default-rtdb.firebaseio.com",
 projectId:"miawwquenn",
 storageBucket:"miawwquenn.firebasestorage.app",
 messagingSenderId:"53904378444",
 appId:"1:53904378444:web:2371e42cb4edf5905a82e9"
};
firebase.initializeApp(firebaseConfig);

const db=firebase.database();
const storage=firebase.storage();

let isAdmin=localStorage.getItem("admin")==="true";
let currentRanking=[];

// ADMIN UI CONTROL
if(isAdmin){
 document.getElementById("rankDeleteBox").style.display="block";
 document.getElementById("pendingBox").style.display="block";
}

// NAV
function showPage(id){
 document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

// ADMIN PANEL
function openAdmin(){ adminPanel.style.display="flex"; }
function closeAdmin(){ adminPanel.style.display="none"; }

// LOGIN
function login(){
 if(pass.value==="ADMIN123"){
  localStorage.setItem("admin","true");
  location.reload();
 } else alert("Password salah");
}
function logout(){
 localStorage.removeItem("admin");
 location.reload();
}

// NOTIF
function notif(text){
 notifBox.innerText=text;
 notifBox.style.display="block";
 setTimeout(()=>notifBox.style.display="none",3000);
}
const notifBox=document.getElementById("notif");

// DONASI
function kirimDonasi(){
 let nama=namaEl.value;
 let jumlah=jumlahEl.value;
 let file=buktiEl.files[0];

 if(!nama||!jumlah){
  notif("Isi dulu!");
  return;
 }

 if(file){
  let ref=storage.ref("bukti/"+Date.now());
  ref.put(file)
  .then(s=>s.ref.getDownloadURL())
  .then(url=>simpan(nama,jumlah,url))
  .catch(()=>simpan(nama,jumlah,"-"));
 } else simpan(nama,jumlah,"-");
}

function simpan(nama,jumlah,url){
 db.ref("donasi").push({
  nama,
  jumlah:parseInt(jumlah),
  bukti:url,
  status:"pending"
 });

 notif("🙏 Terima kasih! Semoga sukses 🤲");

 namaEl.value="";
 jumlahEl.value="";
 buktiEl.value="";
}

// LOAD DATA
db.ref("donasi").on("value",snap=>{
 let data=snap.val()||{};
 leaderboard.innerHTML="";
 pending.innerHTML="";
 listDonatur.innerHTML="";

 let arr=[];

 for(let id in data){
  let d=data[id];

  listDonatur.innerHTML+=`
  <div class="card">${d.nama} - Rp${d.jumlah} (${d.status})</div>`;

  if(d.status==="approved") arr.push({id,...d});

  if(d.status==="pending" && isAdmin){
   pending.innerHTML+=`
   <div class="card">
   ${d.nama} - Rp${d.jumlah}
   <button onclick="acc('${id}')">ACC</button>
   <button onclick="hapus('${id}')">Hapus</button>
   </div>`;
  }
 }

 arr.sort((a,b)=>b.jumlah-a.jumlah);
 currentRanking=arr;

 arr.forEach((d,i)=>{
  let cls="card";
  if(i==0) cls+=" top1";
  if(i==1) cls+=" top2";
  if(i==2) cls+=" top3";

  leaderboard.innerHTML+=`
  <div class="${cls}">
  ${i+1}. ${d.nama}<br>Rp${d.jumlah}
  ${isAdmin?`<button onclick="hapus('${d.id}')">Hapus</button>`:""}
  </div>`;
 });
});

// ACTION (AMAN)
function acc(id){
 if(!isAdmin){alert("Akses ditolak");return;}
 db.ref("donasi/"+id).update({status:"approved"});
}

function hapus(id){
 if(!isAdmin){alert("Akses ditolak");return;}
 if(confirm("Hapus?")){
  db.ref("donasi/"+id).remove();
 }
}

function hapusRank(){
 if(!isAdmin){alert("Akses ditolak");return;}

 let r=parseInt(rankDelete.value);
 let d=currentRanking[r-1];

 if(!d){alert("Tidak ada");return;}

 if(confirm("Hapus rank "+r+"?")){
  db.ref("donasi/"+d.id).remove();
 }
}

// shortcut
const namaEl=nama;
const jumlahEl=jumlah;
const buktiEl=bukti;
</script>

</body>
</html>
