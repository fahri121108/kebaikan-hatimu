<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donasi Ultimate Pro</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<style>
body{
    margin:0;
    font-family:'Segoe UI';
    background:#020617;
    color:white;
}

.nav{
    display:flex;
    justify-content:space-between;
    padding:10px;
    background:#111827;
}

button{
    padding:10px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:black;
}

.page{ display:none; padding:15px;}
.active{ display:block; }

.card{
    background:#111827;
    margin-top:10px;
    padding:10px;
    border-radius:10px;
}

.top1{ background:gold; color:black;}
.top2{ background:silver; color:black;}
.top3{ background:orange; color:black;}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    border:none;
}

#adminBox{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#111827;
    padding:10px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="nav">
<div>
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('list')">Donatur</button>
</div>
</div>

<!-- HOME -->
<div id="home" class="page active">

<h2>💸 Donasi</h2>
<p>DANA: 08XXXXXXX</p>
<img src="qris.jpg" width="100%">

<input type="text" id="nama" placeholder="Nama">
<input type="number" id="jumlah" placeholder="Jumlah">
<input type="file" id="bukti">

<button onclick="kirimDonasi()">Kirim Donasi</button>

<h2>🏆 Leaderboard</h2>
<div id="leaderboard"></div>

<h2>⏳ Pending (Admin)</h2>
<div id="pending"></div>

</div>

<!-- LIST -->
<div id="list" class="page">
<h2>📄 Semua Donatur</h2>
<div id="listDonatur"></div>
</div>

<!-- ADMIN -->
<div id="adminBox">
<input type="password" id="pass" placeholder="Admin">
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBnvcyMdTflihDPg68zsLG-9QxiyV36hgg",
  authDomain: "miawwquenn.firebaseapp.com",
  databaseURL: "https://miawwquenn-default-rtdb.firebaseio.com",
  projectId: "miawwquenn",
  storageBucket: "miawwquenn.firebasestorage.app",
  messagingSenderId: "53904378444",
  appId: "1:53904378444:web:2371e42cb4edf5905a82e9",
  measurementId: "G-TV2M5E49PR"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const storage = firebase.storage();

let isAdmin = localStorage.getItem("admin") === "true";

// LOGIN
function login(){
    let p = document.getElementById("pass").value;
    if(p==="ADMIN123"){
        localStorage.setItem("admin","true");
        alert("Admin aktif");
        location.reload();
    } else {
        alert("Password salah");
    }
}

// LOGOUT
function logout(){
    localStorage.removeItem("admin");
    location.reload();
}

// NAV
function showPage(id){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

// BADGE
function badge(j){
    if(j>=1000000) return "👑 LEGEND";
    if(j>=500000) return "💎 SULTAN";
    if(j>=100000) return "🔥 VIP";
    return "⭐";
}

// KIRIM DONASI
function kirimDonasi(){
    let nama = document.getElementById("nama").value;
    let jumlah = document.getElementById("jumlah").value;
    let file = document.getElementById("bukti").files[0];

    if(!nama||!jumlah||!file){
        alert("Lengkapi!");
        return;
    }

    let ref = storage.ref("bukti/"+Date.now());
    ref.put(file).then(s=>{
        s.ref.getDownloadURL().then(url=>{
            db.ref("donasi").push({
                nama,
                jumlah:parseInt(jumlah),
                bukti:url,
                status:"pending"
            });

            alert("🙏 Terima kasih atas donasi Anda!\nSemoga rezeki dilancarkan, sehat selalu, dan sukses 🤲");
        });
    });
}

// LOAD DATA
db.ref("donasi").on("value", snap=>{
    let data = snap.val() || {};
    let leader = document.getElementById("leaderboard");
    let pending = document.getElementById("pending");
    let list = document.getElementById("listDonatur");

    leader.innerHTML="";
    pending.innerHTML="";
    list.innerHTML="";

    let arr=[];

    for(let id in data){
        let d=data[id];

        // LIST
        list.innerHTML+=`
        <div class="card">
        ${d.nama} - Rp${d.jumlah} (${d.status})
        </div>`;

        if(d.status==="approved"){
            arr.push({
                id:id,
                nama:d.nama,
                jumlah:d.jumlah
            });
        }

        if(d.status==="pending" && isAdmin){
            pending.innerHTML+=`
            <div class="card">
            ${d.nama} - Rp${d.jumlah}<br>
            <img src="${d.bukti}" width="80"><br>
            <button onclick="acc('${id}')">ACC</button>
            <button onclick="hapus('${id}')">Hapus</button>
            </div>`;
        }
    }

    arr.sort((a,b)=>b.jumlah-a.jumlah);

    arr.forEach((d,i)=>{
        let cls="card";
        if(i==0) cls+=" top1";
        if(i==1) cls+=" top2";
        if(i==2) cls+=" top3";

        leader.innerHTML+=`
        <div class="${cls}">
        ${i+1}. ${d.nama} - ${badge(d.jumlah)}<br>
        💰 Rp${d.jumlah}<br>
        ${isAdmin ? `<button onclick="hapus('${d.id}')">🗑️ Hapus</button>`:""}
        </div>`;
    });
});

// ACTION
function acc(id){
    db.ref("donasi/"+id).update({status:"approved"});
}

function hapus(id){
    if(confirm("Yakin mau hapus data ini?")){
        db.ref("donasi/"+id).remove();
    }
}
</script>

</body>
</html>
