<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donasi Bayi Yang Dibuang</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
 margin:0;
 font-family:'Segoe UI';
 background:radial-gradient(circle at top,#020617,#000);
 color:white;
}

.nav{
 display:flex;
 padding:12px;
 gap:10px;
 background:#111827;
 position:sticky;
 top:0;
}

.page{display:none;padding:15px;}
.active{display:block;}

.glass{
 background:rgba(255,255,255,0.05);
 backdrop-filter:blur(15px);
 border-radius:15px;
 padding:15px;
 margin-bottom:15px;
}

input,button{
 width:100%;
 padding:12px;
 margin-top:10px;
 border:none;
 border-radius:10px;
}

button{
 background:linear-gradient(45deg,#22c55e,#4ade80);
 font-weight:bold;
}

.card{
 margin-top:10px;
 padding:12px;
 border-radius:10px;
 background:#111827;
}

.deleteBtn{background:#ef4444;}

.top1{background:gold;color:black;}
.top2{background:silver;color:black;}
.top3{background:orange;color:black;}

canvas{
 background:#111827;
 border-radius:10px;
 padding:10px;
}

/* NOTIF */
#notif{
 position:fixed;
 top:20px;
 left:50%;
 transform:translateX(-50%);
 background:#22c55e;
 padding:10px 20px;
 border-radius:20px;
 display:none;
 z-index:9999;
}

/* ADMIN BUTTON */
#adminBtn{
 position:fixed;
 bottom:20px;
 right:20px;
 background:#22c55e;
 border-radius:50%;
 width:55px;
 height:55px;
 display:flex;
 align-items:center;
 justify-content:center;
 font-size:22px;
}

/* ADMIN PANEL */
#adminPanel{
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 background:rgba(0,0,0,0.7);
 display:none;
 align-items:center;
 justify-content:center;
}

.adminBox{
 background:#111827;
 padding:20px;
 border-radius:12px;
 width:90%;
 max-width:300px;
}
</style>
</head>

<body>

<div id="notif"></div>

<div class="nav">
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('list')">Donatur</button>
</div>

<!-- HOME -->
<div id="home" class="page active">

<div class="glass">
<h2>💛 Donasi Buat Bayi Yang Di Buang Orang Tuanya Dan Di Besarkan Oleh Quenn Sekarang</h2>
<p>Bantu masa depan mereka 🙏</p>
<p><b>DANA:</b> 089610921722</p>
<img src="qris.jpg" style="width:100%;border-radius:10px;">
<input id="nama" placeholder="Nama">
<input id="jumlah" type="number" placeholder="Jumlah">
<input id="bukti" type="file">
<button onclick="kirimDonasi()">Kirim Donasi</button>
</div>

<div class="glass">
<h3>💰 Total Donasi</h3>
<h2 id="total">Rp0</h2>
</div>

<div class="glass">
<h3>📊 Grafik Donasi</h3>
<canvas id="chart"></canvas>
</div>

<div class="glass">
<h3>🏆 Leaderboard</h3>
<div id="leaderboard"></div>
</div>

<div id="pendingBox" class="glass" style="display:none;">
<h3>⏳ Pending</h3>
<div id="pending"></div>
</div>

</div>

<!-- LIST -->
<div id="list" class="page">
<div class="glass">
<h3>📄 Semua Donatur</h3>
<div id="listDonatur"></div>
</div>
</div>

<!-- ADMIN -->
<div id="adminBtn" onclick="openAdmin()">⚙️</div>

<div id="adminPanel">
<div class="adminBox">
<h3>Admin Login</h3>
<input id="pass" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
<button onclick="closeAdmin()">Tutup</button>
</div>
</div>

<script>
// FIREBASE
const firebaseConfig={
 apiKey:"AIzaSyBnvcyMdTflihDPg68zsLG-9QxiyV36hgg",
 authDomain:"miawwquenn.firebaseapp.com",
 databaseURL:"https://miawwquenn-default-rtdb.firebaseio.com",
 projectId:"miawwquenn",
 storageBucket:"miawwquenn.firebasestorage.app",
 messagingSenderId:"53904378444",
 appId:"1:53904378444:web:2371e42cb4edf5905a82e9"
};
firebase.initializeApp(firebaseConfig);

const db=firebase.database();

let isAdmin=localStorage.getItem("admin")==="true";

if(isAdmin){
 document.getElementById("pendingBox").style.display="block";
}

function showPage(id){
 document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

// ADMIN
function openAdmin(){ adminPanel.style.display="flex"; }
function closeAdmin(){ adminPanel.style.display="none"; }

function login(){
 if(pass.value==="ADMIN123"){
  localStorage.setItem("admin","true");
  location.reload();
 } else alert("Password salah");
}

function logout(){
 localStorage.removeItem("admin");
 location.reload();
}

// NOTIF
function notif(text){
 notifBox.innerText=text;
 notifBox.style.display="block";
 setTimeout(()=>notifBox.style.display="none",3000);
}
const notifBox=document.getElementById("notif");

// DONASI
function kirimDonasi(){
 let nama=namaEl.value;
 let jumlah=jumlahEl.value;

 if(!nama||!jumlah){
  notif("Isi dulu!");
  return;
 }

 db.ref("donasi").push({
  nama,
  jumlah:parseInt(jumlah),
  status:"pending"
 });

 notif("🙏 Terima kasih! Semoga sukses 🤲");

 namaEl.value="";
 jumlahEl.value="";
}

// CHART
let chart=new Chart(document.getElementById("chart"),{
 type:"bar",
 data:{labels:[],datasets:[{data:[]}]}
});

// LOAD DATA
db.ref("donasi").on("value",snap=>{
 let data=snap.val()||{};
 leaderboard.innerHTML="";
 pending.innerHTML="";
 listDonatur.innerHTML="";

 let arr=[];
 let total=0;
 let labels=[];
 let values=[];

 for(let id in data){
  let d=data[id];

  listDonatur.innerHTML+=`
  <div class="card">
  ${d.nama} - Rp${d.jumlah} (${d.status || 'pending'})
  ${isAdmin?`<button class="deleteBtn" onclick="hapus('${id}')">Hapus</button>`:""}
  </div>`;

  if(d.status==="approved"){
   arr.push({id,...d});
   total+=d.jumlah;
   labels.push(d.nama);
   values.push(d.jumlah);
  }

  if(d.status==="pending" && isAdmin){
   pending.innerHTML+=`
   <div class="card">
   ${d.nama} - Rp${d.jumlah}
   <button onclick="acc('${id}')">ACC</button>
   <button class="deleteBtn" onclick="hapus('${id}')">Hapus</button>
   </div>`;
  }
 }

 document.getElementById("total").innerText="Rp"+total;

 chart.data.labels=labels;
 chart.data.datasets[0].data=values;
 chart.update();

 arr.sort((a,b)=>b.jumlah-a.jumlah);

 arr.forEach((d,i)=>{
  let cls="card";
  if(i==0) cls+=" top1";
  if(i==1) cls+=" top2";
  if(i==2) cls+=" top3";

  leaderboard.innerHTML+=`
  <div class="${cls}">
  ${i+1}. ${d.nama} - Rp${d.jumlah}
  ${isAdmin?`<button class="deleteBtn" onclick="hapus('${d.id}')">Hapus</button>`:""}
  </div>`;
 });
});

// ACTION
function acc(id){
 if(!isAdmin)return;
 db.ref("donasi/"+id).update({status:"approved"});
}

function hapus(id){
 if(!isAdmin)return;
 if(confirm("Hapus?")){
  db.ref("donasi/"+id).remove();
 }
}

// shortcut
const namaEl=nama;
const jumlahEl=jumlah;
</script>

</body>
</html>
