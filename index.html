<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DONASI DEMI KEBAIKAN</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<style>
body {
    margin:0;
    font-family:'Segoe UI';
    background: radial-gradient(circle at top,#020617,#000);
    color:white;
}

/* LANDING */
#landing {
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    z-index:999;
    animation: fadeOut 4s forwards 3s;
}
#landing h1 {
    color:#facc15;
    font-size:22px;
    max-width:320px;
}
@keyframes fadeOut {
    to {opacity:0; visibility:hidden;}
}

/* CONTAINER */
.container {
    max-width:500px;
    margin:auto;
    padding:15px;
}

/* GLASS */
.glass {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    border-radius:15px;
    padding:15px;
    margin-top:15px;
    box-shadow:0 0 20px rgba(255,255,255,0.05);
}

/* INPUT */
input, button {
    width:100%;
    margin-top:10px;
    padding:12px;
    border:none;
    border-radius:10px;
}
button {
    background:linear-gradient(45deg,#22c55e,#4ade80);
    font-weight:bold;
}

/* QR */
.qris {
    width:100%;
    border-radius:12px;
}

/* CARD */
.card {
    margin-top:10px;
    padding:12px;
    border-radius:12px;
    animation: slideUp .5s ease;
}
@keyframes slideUp {
    from {transform:translateY(30px); opacity:0;}
    to {transform:translateY(0); opacity:1;}
}

/* TOP */
.top1 {
    background:linear-gradient(45deg,#facc15,#eab308);
    color:black;
    box-shadow:0 0 30px gold;
    animation:pulse 1.5s infinite;
}
@keyframes pulse {
    0%{transform:scale(1)}
    50%{transform:scale(1.05)}
    100%{transform:scale(1)}
}
.top2 {
    background:linear-gradient(45deg,#e5e7eb,#9ca3af);
    color:black;
}
.top3 {
    background:linear-gradient(45deg,#fb923c,#ea580c);
    color:black;
}

/* NOTIF */
#notif {
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    background:#22c55e;
    padding:10px 20px;
    border-radius:20px;
    display:none;
    z-index:9999;
}

/* LOGIN */
#loginBox {
    position:fixed;
    bottom:20px;
    right:20px;
}
</style>
</head>

<body>

<div id="notif">💰 Donasi Baru Masuk!</div>

<div id="landing">
<h1>
Donasi untuk Bayi yang Ditemukan 💛<br><br>
Bantu kebutuhan hidup dan masa depan mereka 🙏
</h1>
</div>

<div class="container">

<div class="glass">
<h2>💸 Donasi</h2>
<p><b>DANA:</b> 089610921722</p>
<img src="qris.jpg" class="qris">

<input type="text" id="nama" placeholder="Nama">
<input type="number" id="jumlah" placeholder="Jumlah">
<input type="file" id="bukti">

<button onclick="kirimDonasi()">Kirim Donasi</button>
</div>

<div class="glass">
<h2>🏆 Leaderboard</h2>
<div id="leaderboard"></div>
</div>

<div class="glass">
<h2>⏳ Pending</h2>
<div id="pending"></div>
</div>

</div>

<div id="loginBox">
<input type="password" id="pass" placeholder="Admin">
<button onclick="login()">Login</button>
</div>

<script>
const firebaseConfig = {
    apiKey:"ISI",
    authDomain:"ISI",
    databaseURL:"ISI",
    projectId:"ISI",
    storageBucket:"ISI",
    messagingSenderId:"ISI",
    appId:"ISI"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const storage = firebase.storage();

let isAdmin=false;

// LOGIN
function login(){
    if(document.getElementById("pass").value==="ADMIN123"){
        isAdmin=true;
        alert("Admin aktif");
    } else {
        alert("Password salah");
    }
}

// NOTIF
function showNotif(text){
    let n=document.getElementById("notif");
    n.innerText = text;
    n.style.display="block";
    setTimeout(()=>n.style.display="none",3000);
}

// CONFETTI
function confetti(){
    for(let i=0;i<30;i++){
        let div=document.createElement("div");
        div.style.position="fixed";
        div.style.width="5px";
        div.style.height="5px";
        div.style.background="gold";
        div.style.top="0";
        div.style.left=Math.random()*100+"%";
        document.body.appendChild(div);

        let fall=setInterval(()=>{
            let top=parseFloat(div.style.top);
            div.style.top=(top+5)+"px";
            if(top>window.innerHeight){
                clearInterval(fall);
                div.remove();
            }
        },20);
    }
}

// KIRIM DONASI
function kirimDonasi(){
    let nama=document.getElementById("nama").value;
    let jumlah=document.getElementById("jumlah").value;
    let file=document.getElementById("bukti").files[0];

    if(!nama||!jumlah||!file){
        alert("Lengkapi!");
        return;
    }

    let ref=storage.ref("bukti/"+Date.now());
    ref.put(file).then(s=>{
        s.ref.getDownloadURL().then(url=>{
            db.ref("donasi").push({
                nama,
                jumlah:parseInt(jumlah),
                bukti:url,
                status:"pending"
            });
            alert("Donasi berhasil dikirim 🙏");
        });
    });
}

// NOTIF KHUSUS ADMIN (DONASI BARU)
let firstLoad = true;

db.ref("donasi").on("child_added", snap => {
    let data = snap.val();

    if (firstLoad) return;

    if (isAdmin && data.status === "pending") {
        showNotif("💰 Donasi baru dari " + data.nama);
        confetti();
    }
});

setTimeout(() => {
    firstLoad = false;
}, 2000);

// LOAD DATA
db.ref("donasi").on("value", snap=>{
    let data=snap.val();
    let leader=document.getElementById("leaderboard");
    let pending=document.getElementById("pending");

    leader.innerHTML="";
    pending.innerHTML="";

    let list=[];

    for(let id in data){
        let d=data[id];

        if(d.status==="approved") list.push(d);

        if(d.status==="pending" && isAdmin){
            pending.innerHTML+=`
            <div class="card glass">
            ${d.nama} - Rp${d.jumlah}<br>
            <img src="${d.bukti}" width="100"><br>
            <button onclick="acc('${id}')">ACC</button>
            <button onclick="hapus('${id}')">Hapus</button>
            </div>`;
        }
    }

    list.sort((a,b)=>b.jumlah-a.jumlah);

    list.forEach((d,i)=>{
        let cls="card glass";
        if(i==0) cls+=" top1";
        if(i==1) cls+=" top2";
        if(i==2) cls+=" top3";

        let medal=["👑","🥈","🥉"][i]||"🎖️";

        leader.innerHTML+=`
        <div class="${cls}">
        ${medal} ${d.nama}<br>
        💰 Rp${d.jumlah}
        </div>`;
    });
});

// ACTION
function acc(id){
    db.ref("donasi/"+id).update({status:"approved"});
}
function hapus(id){
    db.ref("donasi/"+id).remove();
}
</script>

</body>
  </html>
