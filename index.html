<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donasi Bayi</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<style>
body{
    font-family:Arial;
    background:#020617;
    color:white;
    margin:0;
}

.header{
    padding:15px;
    text-align:center;
    background:#111827;
}

.container{
    padding:15px;
}

.card{
    background:#111827;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
}

.top1{background:gold;color:black;}
.top2{background:silver;color:black;}
.top3{background:orange;color:black;}

input,button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    border:none;
}

#adminBox{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#111827;
    padding:10px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="header">
<h2>💛 Donasi untuk Bayi yang Ditemukan</h2>
<p>Bantu kebutuhan susu, kesehatan, dan masa depan 🙏</p>
<p id="statusAdmin"></p>
</div>

<div class="container">

<h3>💸 Donasi</h3>
<input id="nama" placeholder="Nama">
<input id="jumlah" type="number" placeholder="Jumlah">
<input id="bukti" type="file">
<button onclick="kirimDonasi()">Kirim Donasi</button>

<h3>🏆 Leaderboard</h3>
<div id="leaderboard"></div>

<h3>⏳ Pending (Admin)</h3>
<div id="pending"></div>

</div>

<div id="adminBox">
<input id="pass" placeholder="Admin">
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBnvcyMdTflihDPg68zsLG-9QxiyV36hgg",
  authDomain: "miawwquenn.firebaseapp.com",
  databaseURL: "https://miawwquenn-default-rtdb.firebaseio.com",
  projectId: "miawwquenn",
  storageBucket: "miawwquenn.firebasestorage.app",
  messagingSenderId: "53904378444",
  appId: "1:53904378444:web:2371e42cb4edf5905a82e9"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const storage = firebase.storage();

let isAdmin = localStorage.getItem("admin") === "true";

// tampilkan status admin
if(isAdmin){
    document.getElementById("statusAdmin").innerText="👑 MODE ADMIN AKTIF";
}

// LOGIN
function login(){
    if(document.getElementById("pass").value==="ADMIN123"){
        localStorage.setItem("admin","true");
        alert("Login berhasil");
        location.reload();
    } else {
        alert("Password salah");
    }
}

// LOGOUT
function logout(){
    localStorage.removeItem("admin");
    location.reload();
}

// BADGE
function badge(j){
    if(j>=1000000) return "👑 LEGEND";
    if(j>=500000) return "💎 SULTAN";
    if(j>=100000) return "🔥 VIP";
    return "⭐";
}

// KIRIM DONASI (FIX)
function kirimDonasi(){
    let nama=document.getElementById("nama").value;
    let jumlah=document.getElementById("jumlah").value;
    let file=document.getElementById("bukti").files[0];

    if(!nama||!jumlah||!file){
        alert("Lengkapi semua!");
        return;
    }

    let ref=storage.ref("bukti/"+Date.now());

    ref.put(file)
    .then(s=>s.ref.getDownloadURL())
    .then(url=>{
        return db.ref("donasi").push({
            nama,
            jumlah:parseInt(jumlah),
            bukti:url,
            status:"pending"
        });
    })
    .then(()=>{
        alert("🙏 Terima kasih atas donasi Anda!\nSemoga sehat & rezeki lancar 🤲");
    })
    .catch(err=>{
        alert("Error: "+err.message);
        console.log(err);
    });
}

// LOAD DATA (FIX)
db.ref("donasi").on("value", snap=>{
    let data=snap.val()||{};
    let leader=document.getElementById("leaderboard");
    let pending=document.getElementById("pending");

    leader.innerHTML="";
    pending.innerHTML="";

    let arr=[];

    for(let id in data){
        let d=data[id];

        if(d.status==="approved"){
            arr.push({id,...d});
        }

        if(d.status==="pending" && isAdmin){
            pending.innerHTML+=`
            <div class="card">
            ${d.nama} - Rp${d.jumlah}<br>
            <button onclick="acc('${id}')">ACC</button>
            <button onclick="hapus('${id}')">Hapus</button>
            </div>`;
        }
    }

    arr.sort((a,b)=>b.jumlah-a.jumlah);

    arr.forEach((d,i)=>{
        let cls="card";
        if(i==0) cls+=" top1";
        if(i==1) cls+=" top2";
        if(i==2) cls+=" top3";

        leader.innerHTML+=`
        <div class="${cls}">
        ${i+1}. ${d.nama} - ${badge(d.jumlah)}<br>
        Rp${d.jumlah}
        ${isAdmin?`<button onclick="hapus('${d.id}')">Hapus</button>`:""}
        </div>`;
    });
});

// ACTION
function acc(id){
    db.ref("donasi/"+id).update({status:"approved"});
}

function hapus(id){
    if(confirm("Hapus data?")){
        db.ref("donasi/"+id).remove();
    }
}
</script>

</body>
</html>
